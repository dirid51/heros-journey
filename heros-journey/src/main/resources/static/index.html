<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Procedural RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
    <aside id="stats-panel">
        <h2>Player Stats</h2>
        <div class="stat">Health: <span id="hp-val">100</span> / <span id="max-hp-val">100</span></div>
        <div class="stat">Injury Reduction: <span id="ir-val">0</span>%</div>
        <h3>Skills</h3>
        <ul id="skills-list"></ul>
    </aside>

    <main id="main-area">
        <div id="history-log">
            <p>Welcome to the void. Type a command to begin your journey.</p>
        </div>
        <div id="input-area">
            <span>&gt; </span>
            <input type="text" id="user-input" autofocus placeholder="Type an action or direction...">
        </div>
    </main>
</div>
<script src="game.js"></script>
</body>
</html>
