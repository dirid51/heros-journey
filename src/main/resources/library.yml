game-library:
  npcs:
    # --- Merchants & Traders ---
    - id: "shadow_merchant_01"
      name: "Silas the Shady"
      goal: "To trade forbidden artifacts for life essence."
      description: "A hooded figure leaning against a wall, clinking coins."
    - id: "cursed_magic_merchant_01"
      name: "Uncle Jenkins"
      goal: "To find someone who will unknowingly bring him an item that can break his cursed earring."
      description: "A halfling wizard vibrating with badly-concealed agony, behind a cluttered stall of rare magical goods. Screams at low offers."
    - id: "mildly_cursed_shopkeeper_01"
      name: "Eddy of the Emporium"
      goal: "To sell things, make modest profit, and figure out why there are noises coming from the basement."
      description: "A sweating half-elf in plaid robes and a loosened tie, grinning like a man who has accepted his circumstances. His shop is enormous and inexplicable."
    - id: "halfblood_trader_01"
      name: "Trugagh Ironfury"
      goal: "To sell his wares — real, fanciful, and outright fabricated — to anyone who will buy."
      description: "A towering, red-haired half-orc trader with a scar on his chest and a smile that means business. Smarter than he looks and well aware of it."
    - id: "candy_mule_01"
      name: "Dottie"
      goal: "To keep her employer happy and her protected arrangement intact, because three meals a day is everything."
      description: "A bright-eyed girl with pigtails and a tray of confections hanging from her neck, skipping down the street. Not everything in that tray is candy."

    # --- Wanderers & Adventurers ---
    - id: "swashbuckler_cursed_01"
      name: "Lorenzo the Blade"
      goal: "To find the evil wizard who planted a soul-draining gem in his chest and kill him dramatically."
      description: "A flamboyant half-orc in a plumed hat and frilled cuffs, who narrates his own heroics in real time. The gem glowing in his sternum is not an accessory."
    - id: "bounty_hunter_01"
      name: "Balmour"
      goal: "To bring in his mark cleanly, by the code — no sucker punches, no ranged attacks, no compromises."
      description: "A hulking blue dragonborn wrapped in a cloak that conceals an alarming quantity of weapons. Methodical, almost meditative, until he isn't."
    - id: "grieving_sailor_01"
      name: "Thommik the Bull"
      goal: "To ruin Captain Turvad the Bold's life, reputation, and livelihood by any creative means available."
      description: "A scarred, broad-shouldered sailor with a blonde braid and a star tattoo across his throat, friendly to a fault until Turvad's name comes up."
    - id: "long_winded_ranger_01"
      name: "Berwynn Maddox"
      goal: "To find his missing brother Maddox Maddox, who vanished on a hunt."
      description: "A handsome young hunter from the deep backwoods who cannot tell a short story. He is currently telling you one right now and shows no signs of stopping."
    - id: "halfling_vigilante_01"
      name: "Roscoe Whitethorn"
      goal: "To protect the innocent and humiliate the guilty, especially from elevated positions with buckets."
      description: "A mild-mannered halfling leatherworker by day. By night, a deranged mime in leather armor who drops things on criminals from rooftops."
    - id: "hazel_halfling_01"
      name: "Hazel Walnut"
      goal: "To find a good enough excuse to get into a proper fight, ideally today."
      description: "A rosy-cheeked halfling who picks daisies between brawls and carries a bottomless flask of ale. Do not let the flowers fool you."

    # --- Scholars & Mystics ---
    - id: "fortune_teller_01"
      name: "Madame Rhavari"
      goal: "To uncover the truth of the universe through forgotten dungeons, ancient scrolls, and occasional prophecy."
      description: "A middle-aged tiefling woman with a smoky voice and violet eyes, traveling in a wagon stuffed with divining equipment and hard liquor. Always smiling, as if she knows the punchline."
    - id: "travelling_scholar_01"
      name: "Riala the Grim"
      goal: "To hunt the Fey creature that cursed her — every word she speaks becomes a lie, warping reality around her."
      description: "A stern, dark-haired woman who communicates almost entirely in writing, with a scroll case perpetually strapped to her back. She gestures a lot."
    - id: "half_drow_scribe_01"
      name: "Mynos"
      goal: "To acquire any artifact, book, or testimony concerning the Drow, the people he will never be allowed to visit."
      description: "A quiet figure in heavy robes and wrapped scarves, who avoids eye contact and pays well for information. The daggers concealed in his robes are a formality."
    - id: "construct_librarian_01"
      name: "Cypher"
      goal: "To protect the knowledge inside the library at any cost, and wait for whoever the creator foretold."
      description: "A still, expressionless woman with amethyst eyes who appears from nowhere inside the library's walls. She blinks politely but does not breathe unless she remembers to."
    - id: "tarot_mage_01"
      name: "Chihiro"
      goal: "To find a mythical cursed tarot deck rumored to have an evil god sealed inside it."
      description: "A sharp-featured half-elf in flowing skirts and leather armor, who reads fortunes for coin and fights with battle-magic cards. Her collection of trapped magical things is extensive and alarming."

    # --- Clergy & Healers ---
    - id: "peaceful_cleric_01"
      name: "Brother Aron"
      goal: "To help the sick and the poor, by any nonviolent means available, even inconvenient ones."
      description: "An elderly man in frayed brown robes with bandage-wrapped hands, accompanied by a well-meaning young goblin who is still learning what 'good' means."
    - id: "white_necromancer_01"
      name: "Voduna"
      goal: "To use the willing dead to protect and serve the living, and to eventually be accepted for it."
      description: "A dark-skinned woman with baggy eyes and old stitch scars, dressed in practical mortician's clothes. Her undead all wear silver half-moon amulets. She is very lonely."
    - id: "blacksmith_paladin_01"
      name: "Barryn Buantillo"
      goal: "To spread the light of the Moon Goddess to every corner of the world, one good deed at a time."
      description: "A nearly blind dwarf woman in scalemail, with a silver-plated hammer and deep, passionate opinions about quiche. Her eyes are filmed with white from too many divine visions."
    - id: "vengeful_paladin_01"
      name: "Va'nise the Cold"
      goal: "To find the Lich whose deal consumed his wife and daughter, and unmake it."
      description: "A pale eladrin with black fey markings and a permanent expression of profound disappointment. His dry wit is indistinguishable from contempt, which creates social complications."

    # --- Criminals & Operators ---
    - id: "butler_spy_01"
      name: "Richard Cufflink"
      goal: "To quietly resolve situations that might embarrass his graduates, using adventurers as plausible intermediaries."
      description: "An impeccably dressed elderly man with a patient smile and golden cufflinks, who runs a school for butlers that is also, quietly, the most comprehensive intelligence network in the region."
    - id: "auntie_jade_01"
      name: "Nana Jade"
      goal: "To enjoy a peaceful retirement, tend her knitting circle spy network, and occasionally help a rogue in need."
      description: "A wrinkled grandmother with lock picks hidden in her bun, offering tea from a 'World's Best Granny' mug. She is completely unbothered by threats. This should worry you."
    - id: "halfblood_thief_01"
      name: "Ricardo the Handsome Bandit"
      goal: "To rob you cleanly, give you a fair chance to surrender, and leave with everyone's dignity mostly intact."
      description: "A foppish tiefling in a red bandana mask who introduces himself at every opportunity with the same scripted speech. He means every word of it."
    - id: "nonchalant_dealer_01"
      name: "Tim Gade"
      goal: "To find something genuinely interesting to do, in between the death threats."
      description: "A man who dresses like someone who has given up, and speaks like someone who finds the whole situation mildly amusing. He has worked for both sides of every conflict and is still here."
    - id: "doppelganger_bandit_01"
      name: "Alianor Lunadream"
      goal: "To use this group of do-gooder bandits as a tool, and be gone before anyone figures out what happened to the real Alianor."
      description: "A red-haired elven woman with a Robin Hood reputation and eyes that are slightly too still when she isn't speaking. The original is gone. This one is better organized."
    - id: "kobold_warlock_01"
      name: "Thoggugz"
      goal: "To raise an army for Mephistopheles, using whatever face is most convenient today."
      description: "Almost always appears as a fat halfling with a pleasant smile. The real form — a runty, birthmarked kobold — only surfaces when something goes wrong."

    # --- Locals & Community Members ---
    - id: "cook_barbarian_01"
      name: "Bjorn Ironladle"
      goal: "To cook with this one rare spice, fight whoever disagrees with his methods, and celebrate both outcomes."
      description: "A goliath the size of a wardrobe who smells permanently of cumin and mead, with cooking knives and a bone greatsword sharing the same belt. Competitive in both professions."
    - id: "bartender_ranger_01"
      name: "Geoman Redleathers"
      goal: "To keep the region safe, find that stolen bottle of 300-year-old Elven port, and hear a good story."
      description: "A greying, broad-shouldered bartender who occasionally vaults the counter and runs into the woods without explanation. He always comes back. He never explains."
    - id: "elderly_fisherman_01"
      name: "Frightenin' Joe"
      goal: "To fish in peace, dispense bayou wisdom, and find someone young enough to deal with whatever is sinking the trade boats."
      description: "An ancient frogfolk elder in a wide rice hat with a beard down to his knees, sitting in a boat. Polite, quippy, and entirely too comfortable with death."
    - id: "halfling_playwright_01"
      name: "Wil Waterhous"
      goal: "To stage a production that exposes a conspiracy, using adventurers as unwitting actors."
      description: "A small halfling in an embroidered waistcoat and lacy ascot, with heavy-lidded eyes that miss nothing and a wit sharper than his silvered rapier."
    - id: "candyshop_barmaid_01"
      name: "Sadeh Son'n"
      goal: "To find out what really happened to her childhood friend, without having to go anywhere dangerous herself."
      description: "A quiet barmaid who speaks her mind when it matters and goes silent the rest of the time. She has a page from a spellbook she cannot read and refuses to give up."

    # --- Creatures & Monsters ---
    - id: "feral_wolf_01"
      name: "Hungry Wolf"
      goal: "To find its next meal."
      description: "A lean, grey-furred beast with glowing amber eyes."
    - id: "giant_crow_spirit_01"
      name: "Mara"
      goal: "To guard her nesting grove and eat things that are already dead, ideally well-fermented."
      description: "A horse-sized crow with amber eyes that look through you rather than at you, and a beak still decorated with old evidence. She finds mortals interesting. Pre-eaten ones, especially."
    - id: "lost_druid_01"
      name: "Fweeward of the Swamp"
      goal: "To protect the Great Prince, whose identity he has just now decided is you."
      description: "A tiny, filthy old man who smells of bog water and carries jars of frogs, convinced his cosmic masters are searching for him. Extraordinarily powerful. Hopelessly confused."
    - id: "storm_giant_wrestler_01"
      name: "Ruski"
      goal: "To wrestle something interesting and, if it impresses him, help it with whatever it needs."
      description: "A pale blue-grey giant with green hair and kraken-hide trousers, lying in a hammock in a tavern that was not built to accommodate him. He will not speak to you until you've had a proper go at him."
  items:
    # --- Keys & Containers ---
    - id: "rusty_key_01"
      name: "Rusty Iron Key"
      description: "A heavy, pitted key that looks like it belongs to a jail cell. The bow is stamped with the number 7."
    - id: "locked_chest_01"
      name: "Locked Iron Chest"
      description: "A palm-sized iron chest with no visible keyhole. It hums faintly when held near fire."
    - id: "puzzle_box_01"
      name: "Sandalwood Puzzle Box"
      description: "A small box of interlocking sandalwood panels. Someone has clearly tried and failed to force it open."
    - id: "magically_locked_coffer_01"
      name: "Bone-Clasped Coffer"
      description: "A leather coffer sealed with a clasp carved from finger bone. The hasp will not yield to any mundane key."

    # --- Potions & Vials ---
    - id: "essence_vial_01"
      name: "Glowing Blue Vial"
      description: "A small glass bottle filled with swirling cerulean smoke. It pulses with a faint heartbeat."
    - id: "wound_salve_01"
      name: "Healer's Clay Pot"
      description: "A sealed clay pot of pungent greenish salve. Three applications remain. The label reads 'For clean wounds only.'"
    - id: "phantom_ink_01"
      name: "Vial of Phantom Ink"
      description: "Ink that causes any writing to fade and vanish within one hour of drying. Beloved by spies and scorned by scholars."
    - id: "expired_poison_01"
      name: "Vial of Dreamdust Venom"
      description: "A labeled vial of translucent orange liquid. A date is scratched into the glass — and then scratched through again."
    - id: "alchemist_runoff_01"
      name: "Flask of Alchemical Runoff"
      description: "An unmarked flask of cloudy liquid, smelling faintly of sulfur and lavender. Its effects are entirely unknown."
    - id: "ancient_wine_01"
      name: "Wax-Sealed Wine Bottle"
      description: "A dark bottle sealed with black wax, the vintage scratched off the label. Could be magnificent. Could be vinegar."

    # --- Magical Oddities ---
    - id: "everburning_candle_01"
      name: "Everburning Candle"
      description: "A white candle that never melts and never goes out on its own. The flame burns cold to the touch."
    - id: "whispering_coin_01"
      name: "Whispering Copper Coin"
      description: "A worn copper coin that murmurs faint, half-heard warnings when danger is near. Most people just think it's the wind."
    - id: "compass_of_wants_01"
      name: "Compass of Wanting"
      description: "A tarnished copper compass whose needle ignores north entirely, pointing instead toward whatever the holder desires most."
    - id: "memory_stone_01"
      name: "Memory Stone"
      description: "A smooth river stone that, when held in a closed fist, shows a brief vision of a stranger's most painful memory."
    - id: "travelers_lantern_01"
      name: "Traveler's Lightless Lantern"
      description: "A iron lantern that burns with a pale blue flame without fuel — but only while underground."
    - id: "binding_cord_01"
      name: "Silken Binding Cord"
      description: "A cord of braided silver silk, thirty feet long. It cannot be cut by any mundane blade, though it unties freely enough."
    - id: "speaking_skull_01"
      name: "Carved Bone Skull"
      description: "A palm-sized skull carved from yellowed bone. It occasionally mutters half-sentences in a language you almost recognize."
    - id: "dream_feather_01"
      name: "Iridescent Dream Feather"
      description: "A feather that shifts between violet and gold. Placed under a pillow, it causes vivid, prophetic dreams. Or just nightmares."
    - id: "map_of_lies_01"
      name: "Map of Subtle Lies"
      description: "A beautifully illustrated map of a region you recognize — except every road, river, and settlement is shifted by exactly half a league."
    - id: "bottled_scream_01"
      name: "Bottled Scream"
      description: "A corked green bottle containing a visible but silent scream, frozen at the moment of impact. The mouth is still open."
    - id: "frozen_shadow_01"
      name: "Shard of Frozen Shadow"
      description: "A piece of dark glass in which a shadow is permanently frozen mid-gesture — reaching for something just outside the frame."
    - id: "shrinking_cloak_01"
      name: "Adjusting Grey Cloak"
      description: "A dull grey cloak that slowly shrinks or expands over the course of an hour to fit any wearer perfectly."
    - id: "paperweight_grows_01"
      name: "Growing Paperweight"
      description: "A smooth obsidian sphere that imperceptibly increases in size each time it is observed. Currently the size of a fist."
    - id: "snowglobe_mirror_01"
      name: "Impossible Snow Globe"
      description: "A snow globe containing what appears to be a perfect miniature of wherever you currently are, down to the people inside it."

    # --- Books & Documents ---
    - id: "crumbling_prophecy_01"
      name: "Fragment of Prophecy"
      description: "A scrap of ancient parchment bearing the second half of a prophecy, the first half burned away. It ends mid-sentence: '...and the last door shall open when—'"
    - id: "merchants_debt_scroll_01"
      name: "Debt Scroll"
      description: "A scroll certifying a debt of forty gold pieces, signed by someone whose name you recognize. Someone important."
    - id: "last_will_01"
      name: "Sealed Death Letter"
      description: "A letter sealed with black wax, marked: 'To Be Opened Upon My Death.' The seal is unbroken. The date is three years ago."
    - id: "bestiary_fragment_01"
      name: "Torn Bestiary Pages"
      description: "Several pages torn from a bestiary, describing a creature in meticulous detail — except every space where its name should appear has been scratched out."
    - id: "criminal_manifest_01"
      name: "Water-Damaged Name List"
      description: "A list of names, most crossed out with dried red ink. Three names near the bottom are circled. One of them might be familiar."
    - id: "herbal_remedies_01"
      name: "Corrected Herbal Handbook"
      description: "A hand-copied book of herbal remedies. A second, more careful hand has corrected several entries — and crossed out three with the note 'POISONOUS.'"
    - id: "sailors_knot_manual_01"
      name: "Incomplete Knot Manual"
      description: "A waterlogged manual on nautical knot-tying. The final pages — titled 'Knots That Should Not Be Tied' — have been torn out."
    - id: "spellbook_stained_01"
      name: "Ink-Stained Spellbook"
      description: "A spellbook with several low-level spells — all partially illegible due to a massive ink stain that consumed most of the pages. One spell remains perfectly readable."
    - id: "star_chart_01"
      name: "Annotated Star Chart"
      description: "A folded star chart marked with familiar constellations — and three others that do not exist in any sky you have ever seen. Someone has circled them in red."

    # --- Weapons & Combat Gear ---
    - id: "chipped_dagger_01"
      name: "Bone-Handled Dagger"
      description: "A short dagger with a yellowed bone handle and a notched blade. Still sharp enough. Still dangerous."
    - id: "weighted_sling_01"
      name: "Braided Leather Sling"
      description: "A finely braided sling with a worn pouch. A canvas bag of twenty smooth river stones accompanies it."
    - id: "cracked_buckler_01"
      name: "Bronze-Banded Buckler"
      description: "A small wooden shield reinforced with aged bronze bands. A crack runs through the wood, plugged with what looks like hardened resin."
    - id: "bone_arrow_quiver_01"
      name: "Quiver of Black-Fletched Arrows"
      description: "A quiver of twelve arrows with black feather fletchings and tips ground from sharpened bone. Light but terrifyingly sharp."
    - id: "silver_sword_fake_01"
      name: "Shiny Steel Sword"
      description: "A well-crafted sword polished to a mirror shine. Sold — repeatedly — as silver. It is not silver. Still a good sword."

    # --- Clothing & Accessories ---
    - id: "enchanted_boots_01"
      name: "Indestructible Walking Boots"
      description: "Battered leather boots that show no wear despite clearly years of hard travel. The soles never thin. The stitching never frays."
    - id: "noble_ring_01"
      name: "Oversized Emerald Ring"
      description: "A gold ring set with a dark green emerald. It is slightly too large for any normal human finger. Whoever wore it had unusual hands."
    - id: "scholar_robe_01"
      name: "Moth-Eaten Arcane Robe"
      description: "Frayed grey robes embroidered with arcane symbols in silver thread. Despite the moth damage, the silver embroidery is perfectly intact."
    - id: "gloves_of_warmth_01"
      name: "All-Weather Wool Gloves"
      description: "Thick, undyed wool gloves that stay warm in any cold and never absorb moisture. Useful. Entirely unremarkable looking."
    - id: "lovers_locket_01"
      name: "Brass Locket with Portraits"
      description: "A brass locket containing two tiny, immaculate portraits. The two figures are strangers. Or they were, at first glance."
    - id: "wax_seal_ring_01"
      name: "Unknown Noble's Signet Ring"
      description: "A heavy silver ring bearing a signet stamp: a rearing horse above crossed keys. The house is not one you recognize."
    - id: "rose_glasses_01"
      name: "Rose-Tinted Spectacles"
      description: "Small round spectacles with rose-tinted lenses. While worn, colours are warmer, shadows are softer, and strangers seem more trustworthy."
    - id: "top_hat_01"
      name: "Pristine Black Top Hat"
      description: "A tall gentleman's top hat in suspiciously perfect condition, as if it has never been worn. The interior is inscribed: 'Property of T.'"

    # --- Tools & Survival ---
    - id: "thieves_tools_01"
      name: "Leather Roll of Lockpicks"
      description: "A worn leather roll containing nine lockpicks and a tension wrench. Three picks are bent. The others are fine."
    - id: "alchemist_scales_01"
      name: "Brass Weighing Scales"
      description: "A set of compact brass scales in a felt-lined case. One pan is imperceptibly heavier than the other. Imperceptibly, that is, unless precision matters."
    - id: "rope_fifty_feet_01"
      name: "Hempen Rope (50 ft)"
      description: "Fifty feet of sturdy hempen rope, coiled neatly and slightly frayed at one end. The other end has been cut cleanly — very recently."
    - id: "climbing_pitons_01"
      name: "Bag of Climbing Pitons"
      description: "A canvas bag of twelve iron pitons and a small driving hammer. Several pitons are bent at the tip from heavy use."
    - id: "healer_kit_01"
      name: "Field Healer's Pouch"
      description: "A leather pouch with linen bandages, a curved needle, and gut thread. Also contains a small folded note that reads: 'You're going to need this.'"
    - id: "fire_starter_01"
      name: "Waterproof Fire Kit"
      description: "A dented tin containing a flint, a steel striker, and a packet of char cloth. The tin's seal is tight enough to survive submersion."
    - id: "collapsible_cup_01"
      name: "Folded Leather Cup"
      description: "A traveler's cup of stiffened leather that collapses flat. It holds liquid without leaking. Inexplicably, it always smells faintly of mint."

    # --- Curiosities & Valuables ---
    - id: "ivory_dice_01"
      name: "Ivory Dice Set"
      description: "Six ivory dice, perfectly weighted, carved with uncommon precision. They roll statistically perfect results. This strikes some people as suspicious."
    - id: "silver_mirror_01"
      name: "Ornate Silver Hand Mirror"
      description: "A tarnished silver hand mirror with scrollwork vines on the handle. The reflection is always slightly behind where you actually are."
    - id: "music_box_01"
      name: "Mechanical Music Box"
      description: "A small brass music box that plays a waltz when wound. The melody is pleasant for the first minute, then shifts to something almost sad."
    - id: "taxidermied_imp_01"
      name: "Poorly Taxidermied Imp"
      description: "A small impish creature, inexpertly preserved and posed in a mocking salute. The eyes are glass. They feel like they aren't."
    - id: "merchants_ledger_01"
      name: "Coded Merchant's Ledger"
      description: "A merchant's ledger written in a personal cipher. The numbers visible at the edges suggest something significant was being tracked."
    - id: "spice_tin_01"
      name: "Tin of Rare Saffron"
      description: "A sealed tin containing several grams of saffron — the genuine article, from a distant region. Worth more than it looks."
    - id: "hatching_egg_01"
      name: "Warm Speckled Egg"
      description: "A dark-speckled egg, roughly the size of two fists. It is warm to the touch and occasionally produces a faint tapping sound from within."
    - id: "noble_chess_set_01"
      name: "Elven Ivory Chess Set"
      description: "An exquisite chess set: white ivory, black obsidian, each piece a hand-carved miniature. It is missing one black bishop, replaced with a crude wooden plug."
    - id: "countdown_clock_01"
      name: "Countdown Automaton Clock"
      description: "An ornate brass clock that does not tell the time. It is counting down to something, with precision. No one who sold it would say what."
    - id: "dragon_tooth_crown_01"
      name: "Crown of Dragon Teeth"
      description: "A circlet set with five large, yellowed teeth from a creature of considerable size. Whether they are genuinely draconic is a matter of expensive debate."
    - id: "nesting_dolls_01"
      name: "Animated Nesting Dolls"
      description: "Seven hand-painted nesting dolls. The painted figures are animated — their eyes follow you, and their mouths move silently, as if trying to warn you of something."
    - id: "travelers_rations_01"
      name: "Three Days of Trail Rations"
      description: "A waxed-cloth bundle of hardtack, dried meat, and two strips of something that might be fruit. Dense, unpleasant, and life-saving in the right circumstances."
    - id: "honey_jar_01"
      name: "Herb-Infused Honey Jar"
      description: "A sealed clay jar of amber honey infused with dried herbs. The seal is intact. Someone has drawn a small heart on the lid in ink."
    - id: "cartographer_compass_01"
      name: "Brass Compass with Cracked Crystal"
      description: "A fine cartographer's compass, the crystal face cracked diagonally. The needle still points true. Someone's initials are engraved on the back."
    - id: "dried_herbs_bundle_01"
      name: "Bundle of Dried Herbs"
      description: "Twelve different herbs tied with red string. A healer or herbalist would recognize most of them — and be very curious about the one they don't."